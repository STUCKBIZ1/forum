<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Post — Forum</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav>
    <a href="/" class="nav-logo">For<span>um</span></a>
    <div class="nav-actions">
        <a href="/" class="btn-ghost">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            <span>Back</span>
        </a>
    </div>
</nav>

<main class="post-form-main">
    <div class="post-form-card">

        <div class="post-form-header">
            <h2>New Post</h2>
            <p>Share something with the community</p>
        </div>

        {{if .Error}}
        <div class="post-form-error">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            {{.Error}}
        </div>
        {{end}}

        <form class="new-post-form" method="POST" action="/post/create">
            <div closs="title-creat-post">
                <label for="title">Title</label>
                <textarea
                    id="Title"
                    name="title"
                    placeholder="What's on your mind?"
                    required
                ></textarea>
            </div>
            <div class="form-group">
                <label for="content">Content</label>
                <textarea
                    id="content"
                    name="content"
                    placeholder="What's on your mind?"
                    required
                ></textarea>
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <div class="select-wrapper">
                    <select id="category" name="category" required>
                        <option value="" disabled selected>Select a category</option>
                        <option value="General">General</option>
                        <option value="Webdeveloper">Webdeveloper</option>
                        <option value="Reports">Reports</option>
                    </select>
                    <svg class="select-arrow" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
                </div>
            </div>

            <div class="form-actions">
                <a href="/" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-post">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    Publish Post
                </button>
            </div>

        </form>

    </div>
</main>

</body>
</html>
