<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login — Forum</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ── Navbar ── -->
<nav>
    <a href="/" class="nav-logo">For<span>um</span></a>
    <div class="nav-actions">
        <a href="/register" class="btn-filled">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <span>Register</span>
        </a>
    </div>
</nav>

<!-- ── Login Card ── -->
<main class="auth-main">
    <div class="auth-card">

        <div class="auth-header">
            <h2>Welcome back</h2>
            <p>Sign in to your account</p>
        </div>

        {{if .Error}}
        <div class="auth-error">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            {{.Error}}
        </div>
        {{end}}

        <form class="auth-form" method="POST" action="/login">

            <div class="form-group">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter your username"
                    required
                    autocomplete="username"
                />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                    autocomplete="current-password"
                />
            </div>

            <button type="submit" class="auth-submit">
                Sign In
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 17l5-5-5-5v10zm-8 0l5-5-5-5v10z"/></svg>
            </button>

        </form>

        <p class="auth-switch">
            Don't have an account? <a href="/register">Register here</a>
        </p>

    </div>
</main>

</body>
</html>
